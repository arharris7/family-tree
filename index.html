        canvas:active { cursor: grabbing; }
        .controls { position: fixed; top: 20px; left: 20px; z-index: 10; display: flex; gap: 10px; }
    </style>

    </div>

        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');

        let scale = 1;
        let offset = { x: 0, y: 0 };
        const nodeWidth = 180;
        const nodeHeight = 80;
        const hGap = 60;
        const vGap = 120;

        function getChildren(partners) {
            return familyData.nodes.filter(n => 
                n.parents && partners.every(p => n.parents.includes(p))
            );
        }

        function calculateLayout() {
            // 1. Assign Levels
            function setLevel(nodeId, level) {
                const node = familyData.nodes.find(n => n.id === nodeId);
                if (!node) return;
                node.level = Math.max(node.level || 0, level);
                const marriages = familyData.marriages.filter(m => m.partners.includes(nodeId));
                marriages.forEach(m => {
                    const partners = m.partners;
                    partners.forEach(pId => {
                        const p = familyData.nodes.find(n => n.id === pId);
                        if (p) p.level = Math.max(p.level || 0, node.level);
                    });
                    const children = getChildren(partners);
                    children.forEach(c => setLevel(c.id, node.level + 1));
                });
            }

            const roots = familyData.nodes.filter(n => !n.parents || n.parents.length === 0);
            roots.forEach(r => setLevel(r.id, 0));

            // 2. Position Nodes recursively
            const placed = new Set();
            const levelCursor = {};

            function positionSubtree(nodeId) {
                if (placed.has(nodeId)) return;
                const node = familyData.nodes.find(n => n.id === nodeId);
                
                // Find all partners for this person
                const marriages = familyData.marriages.filter(m => m.partners.includes(nodeId));
                
                // If there are multiple partners, order them
                // We want the primary person in the middle for remarriages
                const others = [];
                marriages.forEach(m => {
                    const partnerId = m.partners.find(id => id !== nodeId);
                    if (partnerId) others.push(partnerId);
                });

                // partnerList: [Spouse 1, Primary Person, Spouse 2, ...]
                let partnerList = [];
                if (others.length === 1) {
                    partnerList = [nodeId, others[0]];
                } else if (others.length >= 2) {
                    partnerList = [others[0], nodeId, ...others.slice(1)];
                } else {
                    partnerList = [nodeId];
                }
                
                const allChildren = [];
                marriages.forEach(m => {
                    const children = getChildren(m.partners);
                    allChildren.push(...children);
                });

                if (allChildren.length > 0) {
                    allChildren.forEach(c => positionSubtree(c.id));
                    
                    const firstChild = allChildren[0];
                    const lastChild = allChildren[allChildren.length - 1];
                    const childrenMid = (firstChild.x + lastChild.x + nodeWidth) / 2;
                    
                    const blockWidth = partnerList.length * nodeWidth + (partnerList.length - 1) * hGap;
                    let startX = childrenMid - (blockWidth / 2);

                    // Overlap prevention with previous branches on same level
                    const minX = (levelCursor[node.level] || 0) + hGap;
                    if (startX < minX) {
                        const shift = minX - startX;
                        // Shift children too
                        allChildren.forEach(c => shiftSubtree(c.id, shift));
                        startX = minX;
                    }

                    partnerList.forEach((pId, i) => {
                        const p = familyData.nodes.find(n => n.id === pId);
                        if (p) {
                            p.x = startX + i * (nodeWidth + hGap);
                            p.y = p.level * (nodeHeight + vGap);
                            placed.add(pId);
                            levelCursor[node.level] = Math.max(levelCursor[node.level] || 0, p.x + nodeWidth);
                        }
                    });
                } else {
                    // Leaf marriage block
                    let startX = (levelCursor[node.level] || 0) + hGap;
                    partnerList.forEach((pId, i) => {
                        const p = familyData.nodes.find(n => n.id === pId);
                        if (p) {
                            p.x = startX + i * (nodeWidth + hGap);
                            p.y = p.level * (nodeHeight + vGap);
                            placed.add(pId);
                            levelCursor[node.level] = p.x + nodeWidth;
                        }
                    });
                }
            }

            function shiftSubtree(nodeId, amount) {
                const node = familyData.nodes.find(n => n.id === nodeId);
                if (!node || !placed.has(nodeId)) return;
                
                const marriages = familyData.marriages.filter(m => m.partners.includes(nodeId));
                const allPartners = new Set([nodeId]);
                marriages.forEach(m => m.partners.forEach(p => allPartners.add(p)));
                
                allPartners.forEach(pId => {
                    const p = familyData.nodes.find(n => n.id === pId);
                    if (p) p.x += amount;
                });

                marriages.forEach(m => {
                    getChildren(m.partners).forEach(c => shiftSubtree(c.id, amount));
                });
            }

            roots.forEach(r => positionSubtree(r.id));
        }

        function drawTree() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(offset.x, offset.y);
            ctx.scale(scale, scale);

            // Connect lines
            familyData.marriages.forEach(m => {
                const pNodes = m.partners.map(id => familyData.nodes.find(n => n.id === id));
                if (pNodes.length < 2) return;

                // Sort partners by x-position to ensure line logic works
                pNodes.sort((a, b) => a.x - b.x);

                // Marriage line
                ctx.strokeStyle = '#94a3b8';
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(pNodes[0].x + nodeWidth, pNodes[0].y + nodeHeight / 2);
                ctx.lineTo(pNodes[1].x, pNodes[1].y + nodeHeight / 2);
                ctx.stroke();
                ctx.setLineDash([]);

                // Children lines
                const children = getChildren(m.partners);
                if (children.length > 0) {
                    const midX = (pNodes[0].x + nodeWidth + pNodes[1].x) / 2;
                    const midY = pNodes[0].y + nodeHeight / 2;
                    const dropY = midY + vGap / 2;

                    ctx.strokeStyle = '#cbd5e1';
                    ctx.beginPath();
                    ctx.moveTo(midX, midY);
                    ctx.lineTo(midX, dropY);
                    ctx.stroke();

                    children.forEach(c => {
                        const cx = c.x + nodeWidth / 2;
                        ctx.beginPath();
                        ctx.moveTo(midX, dropY);
                        ctx.lineTo(cx, dropY);
                        ctx.lineTo(cx, c.y);
                        ctx.stroke();
                    });
                }
            });

            // Draw Nodes
            familyData.nodes.forEach(node => {
                const isLiving = node.isLiving !== false;
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.05)';
                ctx.beginPath();
                ctx.roundRect(node.x + 3, node.y + 3, nodeWidth, nodeHeight, 8);
                ctx.fill();

                // Box
                ctx.fillStyle = isLiving ? '#ffffff' : '#f1f5f9';
                ctx.strokeStyle = isLiving ? '#3b82f6' : '#94a3b8';
                ctx.lineWidth = isLiving ? 2 : 1;
                
                ctx.beginPath();
                ctx.roundRect(node.x, node.y, nodeWidth, nodeHeight, 8);
                ctx.fill();
                ctx.stroke();

                // Name
                ctx.textAlign = 'center';
                ctx.fillStyle = '#0f172a';
                ctx.font = 'bold 12px Inter, sans-serif';
                ctx.fillText(node.name, node.x + nodeWidth/2, node.y + 35);

                // Dates
                ctx.fillStyle = '#64748b';
                ctx.font = '500 10px Inter, sans-serif';
                const dateStr = node.isLiving ? (node.dob ? `Born ${node.dob}` : 'Living') : `${node.dob || '?'} — ${node.dod || '?'}`;
                ctx.fillText(dateStr, node.x + nodeWidth/2, node.y + 55);
            });

            ctx.restore();
        }

        // --- Interaction Logic ---
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        canvas.onmousedown = (e) => { isDragging = true; lastMouse = { x: e.clientX, y: e.clientY }; };
        window.onmouseup = () => isDragging = false;
        window.onmousemove = (e) => {
            if (isDragging) {
                offset.x += (e.clientX - lastMouse.x);
                offset.y += (e.clientY - lastMouse.y);
                lastMouse = { x: e.clientX, y: e.clientY };
                drawTree();
            }
        };
        canvas.onwheel = (e) => {
            e.preventDefault();
            const zoom = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.min(Math.max(0.1, scale * zoom), 3);
            drawTree();
        };

        document.getElementById('zoomIn').onclick = () => { scale *= 1.2; drawTree(); };
        document.getElementById('zoomOut').onclick = () => { scale *= 0.8; drawTree(); };
        document.getElementById('resetView').onclick = () => {
            scale = 0.5;
            offset = { x: 50, y: 50 };
            drawTree();
        };

        window.onresize = drawTree;
        calculateLayout();
        setTimeout(() => document.getElementById('resetView').click(), 50);

    </script>
